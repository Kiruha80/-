<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Питание">
<title>План питания</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f0f2f5;--card:#fff;--text:#1c1e2a;--muted:#8890a4;--border:#e4e7ee;
  --gym:#e05a35;--kb:#2d6be4;--run:#1a9e5c;--rest:#7b859a;--nav-h:60px;
  --green:#1a9e5c;
}
html,body{height:100%;overflow:hidden;font-family:'Nunito','Segoe UI',sans-serif;font-size:13px;color:var(--text);background:var(--bg);}
body{display:flex;flex-direction:column;}
.screen{display:none;flex:1;overflow-y:auto;padding:12px 10px calc(var(--nav-h) + 12px);}
.screen.active{display:block;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.app-title{font-size:16px;font-weight:900;letter-spacing:-0.3px;}
.app-sub{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px;}
.week-tabs{display:flex;gap:3px;}
.wtab{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;padding:4px 11px;border-radius:20px;border:none;background:var(--card);color:var(--muted);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .15s;}
.wtab.active{background:var(--text);color:#fff;}

/* DAY ROW */
.day-row{display:grid;grid-template-columns:62px 1fr;margin-bottom:4px;}
.day-label{display:flex;flex-direction:column;align-items:center;padding:8px 2px;}
.day-name{font-size:19px;font-weight:900;letter-spacing:-0.5px;line-height:1;}
.day-badge{font-size:7.5px;font-weight:800;text-transform:uppercase;padding:2px 6px;border-radius:10px;margin-top:4px;white-space:nowrap;}
.day-total{font-size:9.5px;font-weight:700;color:var(--muted);padding:8px 0 4px 2px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.meals-strip{display:flex;gap:4px;flex-wrap:wrap;padding-bottom:4px;}

/* MEAL CARD */
.meal-card{
  background:var(--card);border-radius:9px;padding:7px 9px;
  min-width:100px;max-width:140px;flex:1;
  box-shadow:0 1px 4px rgba(0,0,0,.05);border:1.5px solid var(--border);
  cursor:pointer;transition:border-color .15s, box-shadow .15s, opacity .15s;
  position:relative;
}
.meal-card:active{transform:scale(0.98);}
.meal-card.protein{background:#eef4ff;border-color:#bcd4f7;}
.meal-card.eaten{
  border-color:#1a9e5c !important;
  box-shadow:0 0 0 1.5px #1a9e5c22;
}
.meal-card.eaten .mc-name{color:#8890a4;text-decoration:line-through;}
.meal-card.eaten .mc-detail{color:#b0b8c8;}

/* Checkmark badge top-right */
.mc-check{
  position:absolute;top:6px;right:6px;
  width:18px;height:18px;border-radius:50%;
  border:1.5px solid #d0d4de;background:#fff;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.meal-card.eaten .mc-check{
  background:var(--green);border-color:var(--green);
}

.mc-time{font-size:13px;font-weight:900;letter-spacing:-.5px;line-height:1;margin-bottom:1px;padding-right:22px;}
.mc-time.blue{color:var(--kb);}
.mc-slot{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;}
.mc-icon{font-size:14px;margin-bottom:1px;display:block;}
.mc-name{font-size:11px;font-weight:700;line-height:1.2;margin-bottom:2px;transition:color .15s;}
.mc-detail{font-size:9.5px;color:var(--muted);font-weight:600;line-height:1.3;margin-bottom:4px;transition:color .15s;}
.mc-chips{display:flex;gap:3px;flex-wrap:wrap;}
.chip{font-size:8.5px;font-weight:800;padding:1px 5px;border-radius:5px;}
.chip-kcal{background:#f3f4f6;color:#60697d;}
.chip-prot{background:#fff0ec;color:var(--gym);}
.divider{height:1px;background:var(--border);margin:2px 0 8px;}

/* Day progress dots */
.day-progress{display:flex;gap:3px;align-items:center;margin-left:4px;flex-wrap:wrap;}
.dp-dot{width:5px;height:5px;border-radius:50%;background:#e4e7ee;transition:background .2s;}
.dp-dot.on{background:var(--green);}

/* GROCERY */
.g-cat-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:4px;padding-left:2px;}
.g-cat-box{border-radius:11px;overflow:hidden;margin-bottom:10px;}
.g-row{display:flex;align-items:center;gap:9px;padding:8px 11px;cursor:pointer;transition:opacity .2s;}
.g-row.done{opacity:.4;}
.g-row+.g-row{border-top:1px solid var(--border);}
.check-box{width:17px;height:17px;border-radius:5px;border:2px solid #d0d4de;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;transition:all .15s;}
.check-box.on{background:var(--text);border-color:var(--text);}
.g-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.g-info{flex:1;}
.g-name{font-weight:700;font-size:12px;}
.g-note{font-size:9.5px;color:var(--muted);margin-top:1px;}
.g-qty{font-weight:800;font-size:11.5px;white-space:nowrap;}
.progress-bar{background:var(--border);border-radius:8px;height:4px;margin-bottom:14px;overflow:hidden;}
.progress-fill{height:100%;border-radius:8px;background:var(--text);transition:width .3s;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--muted);transition:color .15s;}
.nav-btn.active{color:var(--text);}
.nav-icon{font-size:21px;line-height:1;}
.nav-label{font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;}
</style>
</head>
<body>

<!-- MEAL SCREEN -->
<div class="screen active" id="screen-meal">
  <div class="topbar">
    <div><div class="app-title">🥗 План питания</div><div class="app-sub" id="meal-sub">Кирилл · 46 л · Братислава</div></div>
    <div class="week-tabs" id="meal-tabs"></div>
  </div>
  <div id="meal-main"></div>
</div>

<!-- GROCERY SCREEN -->
<div class="screen" id="screen-grocery">
  <div class="topbar">
    <div><div class="app-title">🛒 Список покупок</div><div class="app-sub" id="grocery-sub">Кирилл · Братислава</div></div>
    <div class="week-tabs" id="grocery-tabs"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div id="grocery-main"></div>
  <div style="margin-top:6px;padding:9px 12px;border-radius:9px;background:#fff;border:1.5px solid var(--border);font-size:10px;color:var(--muted);font-weight:600;line-height:1.5;">💡 <strong style="color:var(--text)">Постоянно в запасе</strong> — корица, масло, соль, перец, чеснок не включены.</div>
</div>

<!-- NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-meal" onclick="switchTab('meal')"><span class="nav-icon">🥗</span><span class="nav-label">Питание</span></button>
  <button class="nav-btn" id="nav-grocery" onclick="switchTab('grocery')"><span class="nav-icon">🛒</span><span class="nav-label">Покупки</span></button>
</nav>

// ── NAV ──
function switchTab(t){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+t).classList.add('active');
  document.getElementById('nav-'+t).classList.add('active');
}

// ── STATE ──
let mW=1, gW=1;

// Load from localStorage or start empty
function loadState(){
  try {
    const me = localStorage.getItem('mEaten');
    const gc = localStorage.getItem('gChecked');
    return {
      mEaten: me ? JSON.parse(me) : {},
      gChecked: gc ? JSON.parse(gc) : {}
    };
  } catch(e) { return {mEaten:{}, gChecked:{}}; }
}
function saveEaten(){ try{ localStorage.setItem('mEaten', JSON.stringify(mEaten)); }catch(e){} }
function saveChecked(){ try{ localStorage.setItem('gChecked', JSON.stringify(gChecked)); }catch(e){} }

const _s = loadState();
let mEaten = _s.mEaten;
let gChecked = _s.gChecked;

const CHECK_SVG = `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

// ── MEAL TABS ──
function rMT(){
  const c=document.getElementById('meal-tabs');c.innerHTML='';
  for(let w=1;w<=4;w++){
    const b=document.createElement('button');
    b.className='wtab'+(w===mW?' active':'');
    b.textContent='Нед '+w;
    b.onclick=()=>{mW=w;rM();rMT();};
    c.appendChild(b);
  }
}

// ── MEAL RENDER ──
function rM(){
  const main=document.getElementById('meal-main');
  main.innerHTML='';
  const wd=M[mW];

  // Count total eaten for subtitle
  let totalMeals=0, totalEaten=0;
  DAYS.forEach(day=>{
    const ms=wd[day]||[];
    totalMeals+=ms.length;
    ms.forEach((_,i)=>{ if(mEaten[mW+'-'+day+'-'+i]) totalEaten++; });
  });
  document.getElementById('meal-sub').textContent=`Кирилл · 46 л · Братислава · ${totalEaten}/${totalMeals} съедено`;

  DAYS.forEach(day=>{
    const tp=DAY_TYPE[day];
    const c=DC[tp];
    const wi=WORKOUT[day];
    const ms=wd[day]||[];
    const tk=ms.reduce((s,m)=>s+m.k,0);
    const tp2=ms.reduce((s,m)=>s+m.p,0);
    const dayEaten=ms.filter((_,i)=>mEaten[mW+'-'+day+'-'+i]).length;

    const row=document.createElement('div');
    row.className='day-row';

    // Day label
    const dl=document.createElement('div');
    dl.className='day-label';
    dl.innerHTML=`<div class="day-name" style="color:${c.a}">${day}</div><div class="day-badge" style="background:${c.b};color:${c.a}">${DAY_BADGE[tp]}</div>`;
    row.appendChild(dl);

    const right=document.createElement('div');

    // Total row with dots
    const tot=document.createElement('div');
    tot.className='day-total';
    tot.style.display='flex';
    tot.style.alignItems='center';
    tot.style.flexWrap='wrap';
    tot.style.gap='4px';
    const dotsHtml=ms.map((_,i)=>`<div class="dp-dot${mEaten[mW+'-'+day+'-'+i]?' on':''}"></div>`).join('');
    tot.innerHTML=`<span><strong>${tk} ккал</strong> · <span style="color:#e05a35">${tp2}г белка</span> · <em>${wi.icon} ${wi.text}</em></span><div class="day-progress">${dotsHtml}</div>`;
    right.appendChild(tot);

    // Meal cards
    const strip=document.createElement('div');
    strip.className='meals-strip';
    ms.forEach((m,i)=>{
      const sl=SL[m.t]||m.t;
      const ic=MI[sl]||'🍴';
      const isP=m.n.includes('Протеин')||m.n.includes('протеин');
      const key=mW+'-'+day+'-'+i;
      const eaten=!!mEaten[key];

      const card=document.createElement('div');
      card.className='meal-card'+(isP?' protein':'')+(eaten?' eaten':'');
      card.innerHTML=`
        <div class="mc-check">${eaten?CHECK_SVG:''}</div>
        <div class="mc-time${isP?' blue':''}">${m.t}</div>
        <div class="mc-slot">${sl}</div>
        <span class="mc-icon">${ic}</span>
        <div class="mc-name">${m.n}</div>
        <div class="mc-detail">${m.d}</div>
        <div class="mc-chips">
          <span class="chip chip-kcal">${m.k} ккал</span>
          <span class="chip chip-prot">${m.p}г б</span>
        </div>`;
      card.onclick=()=>{ mEaten[key]=!mEaten[key]; saveEaten(); rM(); };
      strip.appendChild(card);
    });
    right.appendChild(strip);
    row.appendChild(right);
    main.appendChild(row);

    const dv=document.createElement('div');
    dv.className='divider';
    main.appendChild(dv);
  });
}

// ── GROCERY TABS ──
function rGT(){
  const c=document.getElementById('grocery-tabs');c.innerHTML='';
  for(let w=1;w<=4;w++){
    const b=document.createElement('button');
    b.className='wtab'+(w===gW?' active':'');
    b.textContent='Нед '+w;
    b.onclick=()=>{gW=w;rG();rGT();};
    c.appendChild(b);
  }
}

// ── GROCERY RENDER ──
function rG(){
  const main=document.getElementById('grocery-main');
  main.innerHTML='';
  const data=G[gW];
  let tot=0;
  Object.values(data).forEach(cat=>tot+=cat.i.length);
  const done=Object.values(gChecked).filter(Boolean).length;
  const pct=tot?Math.round(done/tot*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('grocery-sub').textContent=`Кирилл · Братислава · ${done}/${tot} куплено · ${pct}%`;

  let gi=0;
  Object.entries(data).forEach(([cat,{c,i}])=>{
    const sec=document.createElement('div');
    const tit=document.createElement('div');
    tit.className='g-cat-title';
    tit.textContent=cat;
    sec.appendChild(tit);
    const box=document.createElement('div');
    box.className='g-cat-box';
    box.style.background=c.bg;
    box.style.border=`1.5px solid ${c.br}`;
    i.forEach(item=>{
      const key=gW+'-'+gi;
      const done2=!!gChecked[key];
      const ck=key;
      const row=document.createElement('div');
      row.className='g-row'+(done2?' done':'');
      row.innerHTML=`<div class="check-box${done2?' on':''}">${done2?CHECK_SVG:''}</div><div class="g-dot" style="background:${c.d}"></div><div class="g-info"><div class="g-name" style="${done2?'text-decoration:line-through;color:#aaa':''}">${item.n}</div><div class="g-note">${item.nt}</div></div><div class="g-qty" style="color:${done2?'#bbb':c.d}">${item.q}</div>`;
      row.onclick=()=>{gChecked[ck]=!gChecked[ck]; saveChecked(); rG();};
      box.appendChild(row);
      gi++;
    });
    sec.appendChild(box);
    main.appendChild(sec);
  });
}

// ── INIT ──
rMT(); rM(); rGT(); rG();
</script>
